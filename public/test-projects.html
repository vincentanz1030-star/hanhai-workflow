<!DOCTYPE html>
<html>
<head>
  <title>项目测试页面</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; }
    .log { background: #f5f5f5; padding: 10px; margin: 10px 0; border-radius: 5px; }
    .success { color: green; }
    .error { color: red; }
    button { padding: 10px 20px; margin: 5px; }
  </style>
</head>
<body>
  <h1>项目测试页面</h1>
  <div>
    <button onclick="testLogin()">登录</button>
    <button onclick="testGetProjects()">获取项目</button>
    <button onclick="testCreateProject()">创建项目</button>
    <button onclick="testLogout()">退出登录</button>
  </div>
  <div id="log"></div>

  <script>
    let token = '';

    function log(message, type = 'info') {
      const logDiv = document.getElementById('log');
      const time = new Date().toLocaleTimeString();
      const className = type === 'success' ? 'success' : type === 'error' ? 'error' : '';
      logDiv.innerHTML += `<div class="log ${className}">[${time}] ${message}</div>`;
      console.log(message);
    }

    async function testLogin() {
      log('开始登录...');
      try {
        const response = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            email: 'admin@hanhai.com',
            password: 'admin123'
          })
        });
        const data = await response.json();
        if (data.token) {
          token = data.token;
          localStorage.setItem('auth_token', token);
          log('登录成功，Token: ' + token.substring(0, 50) + '...', 'success');
        } else {
          log('登录失败: ' + JSON.stringify(data), 'error');
        }
      } catch (error) {
        log('登录错误: ' + error, 'error');
      }
    }

    async function testGetProjects() {
      log('开始获取项目...');
      try {
        const response = await fetch('/api/projects?brand=all&category=all', {
          headers: { 'Authorization': 'Bearer ' + token }
        });
        const data = await response.json();
        const count = data.projects?.length || 0;
        log('获取成功，项目数量: ' + count, 'success');
        if (count > 0) {
          log('最新项目: ' + data.projects[0].name + ' (品牌: ' + data.projects[0].brand + ')');
        }
      } catch (error) {
        log('获取错误: ' + error, 'error');
      }
    }

    async function testCreateProject() {
      log('开始创建项目...');
      const name = '测试项目-' + Date.now();
      try {
        const response = await fetch('/api/projects', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': 'Bearer ' + token
          },
          body: JSON.stringify({
            name: name,
            brand: 'he_zhe',
            category: 'product_development',
            salesDate: '2026-12-01',
            description: '测试项目'
          })
        });
        const data = await response.json();
        if (data.project) {
          log('创建成功，项目ID: ' + data.project.id.substring(0, 8) + '...', 'success');
          log('项目名称: ' + data.project.name);
        } else {
          log('创建失败: ' + JSON.stringify(data), 'error');
        }
      } catch (error) {
        log('创建错误: ' + error, 'error');
      }
    }

    async function testLogout() {
      log('开始退出登录...');
      try {
        await fetch('/api/auth/logout', {
          method: 'POST',
          headers: { 'Authorization': 'Bearer ' + token }
        });
        localStorage.removeItem('auth_token');
        token = '';
        log('退出登录成功', 'success');
      } catch (error) {
        log('退出登录错误: ' + error, 'error');
      }
    }

    // 页面加载时自动登录
    window.onload = function() {
      log('页面已加载，请点击按钮测试');
      const savedToken = localStorage.getItem('auth_token');
      if (savedToken) {
        token = savedToken;
        log('已从 localStorage 恢复 Token');
      }
    };
  </script>
</body>
</html>
